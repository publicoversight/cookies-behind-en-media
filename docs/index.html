<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookie Vendor Network behind popular English News Outlets in June 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f0; color: #111; font-family: "Inter", "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 20; padding: 16px 24px; background: #f5f5f0; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #111; }
  #header p { font-size: 11px; color: #888; margin-top: 2px; }
  #controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #ccc; background: #fff; color: #555; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { background: #eee; }
  .filter-btn.active { background: #111; border-color: #111; color: #fff; }
  #canvas { width: 100vw; height: 100vh; }
  #panel { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: #fff; border-left: 1px solid #ddd; z-index: 30; transition: right 0.3s ease; overflow-y: auto; padding: 24px; }
  #panel.open { right: 0; }
  #panel-close { position: absolute; top: 16px; right: 16px; cursor: pointer; font-size: 18px; color: #999; background: none; border: none; }
  #panel-close:hover { color: #111; }
  #panel-logo { width: 48px; height: 48px; border-radius: 10px; object-fit: contain; border: 1px solid #eee; margin-bottom: 12px; background: #f9f9f9; padding: 4px; }
  #panel-title { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 4px; word-break: break-all; }
  #panel-subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
  .panel-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-bottom: 16px; }
  .badge-outlet  { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .badge-ad      { background: #fde8e8; color: #c0392b; border: 1px solid #e74c3c; }
  .badge-analytics { background: #e8f0fe; color: #1a56db; border: 1px solid #4285f4; }
  .badge-unknown { background: #f0f0f0; color: #666; border: 1px solid #ccc; }
  .panel-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
  .panel-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 10px; }
  .connection-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; color: #333; background: #f9f9f9; cursor: pointer; transition: background 0.15s; }
  .connection-item:hover { background: #eee; }
  .connection-logo { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; background: #fff; border: 1px solid #eee; flex-shrink: 0; }
  #legend { position: fixed; bottom: 20px; left: 20px; font-size: 11px; color: #888; z-index: 10; background: rgba(245,245,240,0.9); padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; }
  #legend div { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #stats { position: fixed; bottom: 20px; right: 20px; font-size: 11px; color: #aaa; text-align: right; z-index: 10; }
  #tooltip { position: fixed; background: rgba(255,255,255,0.97); border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 220px; }
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>Cookie Vendor Network</h1>
    <p>Third-party tracking domains behind 20 global news outlets</p>
  </div>
  <div id="controls">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Ad Motivated Tracking">Ad Tracking</button>
    <button class="filter-btn" data-filter="Analytics">Analytics</button>
    <button class="filter-btn" data-filter="CDN">CDN</button>
    <button class="filter-btn" data-filter="Unknown">Unknown</button>
  </div>
</div>
<svg id="canvas"></svg>
<div id="panel">
  <button id="panel-close">&#x2715;</button>
  <img id="panel-logo" src="" alt="">
  <div id="panel-title"></div>
  <div id="panel-subtitle"></div>
  <div id="panel-badge-wrap"></div>
  <div class="panel-section">
    <h3 id="panel-connections-label">Connections</h3>
    <div id="panel-connections"></div>
  </div>
</div>
<div id="tooltip"></div>
<div id="legend">
  <div><div class="dot" style="background:#f0a500"></div> News Outlet</div>
  <div><div class="dot" style="background:#e74c3c"></div> Ad Tracking</div>
  <div><div class="dot" style="background:#4285f4"></div> Analytics / CDN</div>
  <div><div class="dot" style="background:#aaa"></div> Unknown Vendor</div>
</div>
<div id="stats">
  <div id="stat-nodes"></div>
  <div id="stat-edges"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const WIDTH = window.innerWidth;
const HEIGHT = window.innerHeight;
const svg = d3.select("#canvas").attr("width", WIDTH).attr("height", HEIGHT);
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.05, 10]).on("zoom", e => g.attr("transform", e.transform)));
const tooltip = document.getElementById("tooltip");
const panel = document.getElementById("panel");
let allNodes = [], allEdges = [], sim;
let selectedId = null;

function logoUrl(domain) { return "https://logo.clearbit.com/" + domain; }
function nodeColor(d) {
  if (d.type === "outlet") return "#f0a500";
  const cat = (d.category || "").toLowerCase();
  if (cat.includes("ad")) return "#e74c3c";
  if (cat.includes("analytics") || cat.includes("cdn") || cat.includes("embedded")) return "#4285f4";
  return "#aaa";
}
function nodeRadius(d, cc) {
  if (d.type === "outlet") return 16;
  const c = cc[d.id] || 1;
  return Math.max(5, Math.min(20, 4 + c * 1.5));
}
function badgeClass(d) {
  if (d.type === "outlet") return "badge-outlet";
  const cat = (d.category || "").toLowerCase();
  if (cat.includes("ad")) return "badge-ad";
  if (cat.includes("analytics") || cat.includes("cdn")) return "badge-analytics";
  return "badge-unknown";
}
function badgeLabel(d) {
  if (d.type === "outlet") return "News Outlet";
  const cat = (d.category || "").toLowerCase();
  if (cat.includes("ad")) return "Ad Tracking";
  if (cat.includes("analytics")) return "Analytics";
  if (cat.includes("cdn")) return "CDN";
  return "Unknown";
}
function closePanel() { panel.classList.remove("open"); }
function openPanel(d, edges, cc) {
  const connectedEdges = edges.filter(e => {
    const s = typeof e.source === "object" ? e.source.id : e.source;
    const t = typeof e.target === "object" ? e.target.id : e.target;
    return s === d.id || t === d.id;
  });
  const connectedNodes = connectedEdges.map(e => {
    const s = typeof e.source === "object" ? e.source.id : e.source;
    const t = typeof e.target === "object" ? e.target.id : e.target;
    return s === d.id ? t : s;
  });
  const logoEl = document.getElementById("panel-logo");
  logoEl.style.display = "block";
  logoEl.src = logoUrl(d.id);
  logoEl.onerror = function() { this.style.display = "none"; };
  document.getElementById("panel-title").textContent = d.id;
  document.getElementById("panel-subtitle").textContent = d.owner || "";
  document.getElementById("panel-badge-wrap").innerHTML = "<span class='panel-badge " + badgeClass(d) + "'>" + badgeLabel(d) + "</span>";
  const label = d.type === "outlet" ? "Vendors tracking this site (" + connectedNodes.length + ")" : "Appears on these outlets (" + connectedNodes.length + ")";
  document.getElementById("panel-connections-label").textContent = label;
  const container = document.getElementById("panel-connections");
  container.innerHTML = "";
  connectedNodes.forEach(nid => {
    const n = allNodes.find(x => x.id === nid);
    if (!n) return;
    const item = document.createElement("div");
    item.className = "connection-item";
    const img = document.createElement("img");
    img.className = "connection-logo";
    img.src = logoUrl(nid);
    img.onerror = function() { this.style.display = "none"; };
    const span = document.createElement("span");
    span.innerHTML = nid + (n.owner ? " <span style='color:#aaa'>· " + n.owner + "</span>" : "");
    item.appendChild(img);
    item.appendChild(span);
    item.addEventListener("click", () => { selectedId = nid; openPanel(n, allEdges, cc); highlightNode(nid); });
    container.appendChild(item);
  });
  panel.classList.add("open");
}
function highlightNode(id) {
  const connectedIds = new Set();
  allEdges.forEach(e => {
    const s = typeof e.source === "object" ? e.source.id : e.source;
    const t = typeof e.target === "object" ? e.target.id : e.target;
    if (s === id) connectedIds.add(t);
    if (t === id) connectedIds.add(s);
  });
  connectedIds.add(id);
  g.selectAll("circle").attr("opacity", d => connectedIds.has(d.id) ? 1 : 0.08);
  g.selectAll("line").attr("opacity", e => {
    const s = typeof e.source === "object" ? e.source.id : e.source;
    const t = typeof e.target === "object" ? e.target.id : e.target;
    return (s === id || t === id) ? 0.8 : 0.03;
  });
  g.selectAll("text").attr("opacity", d => connectedIds.has(d.id) ? 1 : 0.08);
}
function resetHighlight() {
  g.selectAll("circle").attr("opacity", 1);
  g.selectAll("line").attr("opacity", 0.15);
  g.selectAll("text").attr("opacity", 1);
}
function draw(nodes, edges, cc) {
  g.selectAll("*").remove();
  const linkSel = g.append("g").selectAll("line").data(edges).enter().append("line")
    .attr("stroke", "#ccc").attr("stroke-width", 0.8).attr("opacity", 0.15);
  const nodeSel = g.append("g").selectAll("circle").data(nodes).enter().append("circle")
    .attr("r", d => nodeRadius(d, cc))
    .attr("fill", d => nodeColor(d))
    .attr("stroke", d => d.type === "outlet" ? "#111" : "#fff")
    .attr("stroke-width", d => d.type === "outlet" ? 2 : 0.5)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (event, d) => { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on("end", (event, d) => { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("mouseover", (event, d) => {
      const c = edges.filter(e => {
        const s = typeof e.source === "object" ? e.source.id : e.source;
        const t = typeof e.target === "object" ? e.target.id : e.target;
        return s === d.id || t === d.id;
      }).length;
      tooltip.innerHTML = "<strong>" + d.id + "</strong><br>" + (d.owner ? d.owner + "<br>" : "") + (d.category ? "<span style='color:#888'>" + d.category + "</span><br>" : "") + c + " connection" + (c !== 1 ? "s" : "");
      tooltip.style.opacity = 1;
    })
    .on("mousemove", event => { tooltip.style.left = (event.clientX + 14) + "px"; tooltip.style.top = (event.clientY - 10) + "px"; })
    .on("mouseout", () => { tooltip.style.opacity = 0; })
    .on("click", (event, d) => { event.stopPropagation(); selectedId = d.id; openPanel(d, edges, cc); highlightNode(d.id); });
  const labelSel = g.append("g").selectAll("text").data(nodes.filter(n => n.type === "outlet")).enter().append("text")
    .text(d => d.id)
    .attr("font-size", "9px").attr("font-family", "Inter, sans-serif").attr("fill", "#333")
    .attr("text-anchor", "middle").attr("dy", d => -nodeRadius(d, cc) - 5)
    .style("pointer-events", "none");
  svg.on("click", () => { if (selectedId) { selectedId = null; closePanel(); resetHighlight(); } });
  sim.nodes(nodes);
  sim.force("link").links(edges);
  sim.alpha(1).restart();
  sim.on("tick", () => {
    linkSel.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
    labelSel.attr("x", d => d.x).attr("y", d => d.y);
  });
}
Promise.all([
  fetch("nodes.json").then(r => r.json()),
  fetch("edges.json").then(r => r.json())
]).then(([nodes, edges]) => {
  allNodes = nodes; allEdges = edges;
  const cc = {};
  edges.forEach(e => { cc[e.target] = (cc[e.target] || 0) + 1; });
  document.getElementById("stat-nodes").textContent = nodes.length + " nodes";
  document.getElementById("stat-edges").textContent = edges.length + " connections";
  sim = d3.forceSimulation()
    .force("link", d3.forceLink().id(d => d.id).distance(80).strength(0.3))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(WIDTH / 2, HEIGHT / 2))
    .force("collision", d3.forceCollide().radius(d => nodeRadius(d, cc) + 3));
  draw(nodes, edges, cc);
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const f = btn.dataset.filter;
      selectedId = null; closePanel();
      let fn, fe;
      if (f === "all") { fn = nodes; fe = edges; }
      else {
        const matching = new Set(nodes.filter(n => n.type === "vendor" && (n.category || "").includes(f)).map(n => n.id));
        fe = edges.filter(e => matching.has(typeof e.target === "object" ? e.target.id : e.target));
        const connectedOutlets = new Set(fe.map(e => typeof e.source === "object" ? e.source.id : e.source));
        fn = nodes.filter(n => matching.has(n.id) || connectedOutlets.has(n.id));
      }
      draw(fn, fe, cc);
    });
  });
  document.getElementById("panel-close").addEventListener("click", () => { selectedId = null; closePanel(); resetHighlight(); });
}).catch(err => {
  console.error("Failed to load data:", err);
  document.body.innerHTML += "<div style='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px;border-radius:8px;border:1px solid #ddd;font-family:sans-serif;color:#c0392b'>Error loading data: " + err.message + "</div>";
});
</script>
</body>
</html>
